apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-app
  namespace: cache-app
  labels:
    app: cache-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cache-app
  template:
    metadata:
      labels:
        app: cache-app
    spec:
      containers:
        - name: cache-app
          image: cache-app:1.0.1        # <-- replace with your actual image name/tag
          imagePullPolicy: Never  # use Always if pulling from a remote registry
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: cache-app-config
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
