apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-postgres
  labels:
    app: audit-postgres
    service: audit-service
  namespace: cache-app
spec:
  selector:
    matchLabels:
      app: audit-postgres
  template:
    metadata:
      labels:
        app: audit-postgres
        service: audit-service
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: audit_db
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: audit-postgres
spec:
  ports:
    - port: 5432
  selector:
    app: audit-postgres
  type: ClusterIP