apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: cache-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      containers:
        - name: app
          image: audit-service:0.0.4
          imagePullPolicy: Never
          ports:
            - containerPort: 8080

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s

          envFrom:
            - configMapRef:
                name: customer-audit-service-config
            - secretRef:
                name: customer-audit-service-secret

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15

---

apiVersion: v1
kind: Service
metadata:
  name: audit-service
  namespace: cache-app
  labels:
    app: audit-service
spec:
  selector:
    app: audit-service
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30002
  type: NodePort