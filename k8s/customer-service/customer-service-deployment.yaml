apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: cache-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
        - name: app
          image: customer-service:0.0.2
          imagePullPolicy: Never
          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: customer-service-config
            - secretRef:
                name: customer-service-secret

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15

---

apiVersion: v1
kind: Service
metadata:
  name: customer-service
  namespace: cache-app
  labels:
    app: customer-service
spec:
  selector:
    app: customer-service
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30001
  type: NodePort


