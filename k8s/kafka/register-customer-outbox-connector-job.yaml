apiVersion: batch/v1
kind: Job
metadata:
  name: register-customer-outbox-connector
  namespace: cache-app
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never

      containers:
        - name: register-connector
          image: curlimages/curl:8.12.1

          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: debezium-connector-secret
                  key: DB_USERNAME

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: debezium-connector-secret
                  key: DB_PASSWORD

          command:
            - /bin/sh
            - -c
            - |
              set -eu

              CONNECT_URL="http://kafka-connect:8083"
              CONNECTOR_NAME="mysql-outbox-connector"

              echo "Waiting for Kafka Connect..."
              until curl -fsS "${CONNECT_URL}/" > /dev/null; do
                sleep 5
              done

              echo "Kafka Connect is ready"

              echo "Rendering connector config..."

              cat /config/connector.json | \
                sed -e "s|\${DB_USERNAME}|${DB_USERNAME}|g" \
                    -e "s|\${DB_PASSWORD}|${DB_PASSWORD}|g" \
                > /tmp/connector.json

              echo "Upserting connector..."

              HTTP_CODE=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
                -X PUT \
                -H "Content-Type: application/json" \
                "${CONNECT_URL}/connectors/${CONNECTOR_NAME}/config" \
                --data-binary @/tmp/connector.json || true)

              echo "HTTP: ${HTTP_CODE}"
              cat /tmp/resp.txt

              if [ "${HTTP_CODE}" != "200" ] && [ "${HTTP_CODE}" != "201" ]; then
                echo "FAILED"
                exit 1
              fi

              echo "Checking connector status..."

              for i in $(seq 1 20); do
                STATUS=$(curl -s -o /tmp/status.txt -w "%{http_code}" \
                  "${CONNECT_URL}/connectors/${CONNECTOR_NAME}/status" || true)

                echo "Status HTTP: ${STATUS}"

                if [ "${STATUS}" = "200" ]; then
                  echo "Connector is running"
                  exit 0
                fi

                sleep 3
              done

              echo "Connector not ready"
              exit 1

          volumeMounts:
            - name: connector-config
              mountPath: /config

      volumes:
        - name: connector-config
          configMap:
            name: mysql-outbox-connector