apiVersion: apps/v1
kind: StatefulSet
# Use a StatefulSet instead of a Deployment for stateful systems because it guarantees stable network identities
# (predictable pod names) and stable persistent storage attached to each replica. This is critical for systems like databases or Kafka,
# where data consistency and recovery depend on a consistent identity and disk across restarts.
# Unlike Deployments, StatefulSets ensure ordered startup/shutdown and prevent data loss caused by pod replacement.

metadata:
  name: kafka
  namespace: cache-app
  labels:
    app: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  serviceName: kafka
  # Added serviceName because StatefulSet requires a stable network identity
  # for predictable pod DNS names and stable storage mapping.
  replicas: 1
  selector:
    matchLabels:
      app: kafka

  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          ports:
            - containerPort: 9092
            - containerPort: 9093

          env:
            - name: KAFKA_NODE_ID
              value: "1"

            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"

            # IMPORTANT: stable identity in StatefulSet
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka-0.kafka.cache-app.svc.cluster.local:9093"

            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"

            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka.cache-app.svc.cluster.local:9092"

            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"

            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"

            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"

            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"

            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false"

            - name: KAFKA_LOG_RETENTION_HOURS
              value: "24"

            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"

            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"

            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"

            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"

            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"

          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data

          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "500m"

          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 20

  volumeClaimTemplates:
    # Replaced standalone PVC with volumeClaimTemplates.
    # This is the recommended StatefulSet approach because each pod
    # gets its own dedicated persistent storage automatically.
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: cache-app
spec:
  clusterIP: None
  # Changed to headless service.
  # StatefulSets should use a headless service for stable DNS identities.

  # REQUIRED for Kafka StatefulSet.
  # Allows DNS records to exist before pod readiness succeeds.
  publishNotReadyAddresses: true

  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093