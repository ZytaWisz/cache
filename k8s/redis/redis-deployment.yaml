apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-redis
  namespace: cache-app
  labels:
    app: customer-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-redis
  template:
    metadata:
      labels:
        app: customer-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli ping
            initialDelaySeconds: 10
            periodSeconds: 5

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli ping
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: customer-redis
  namespace: cache-app
  labels:
    app: customer-redis
spec:
  selector:
    app: customer-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP