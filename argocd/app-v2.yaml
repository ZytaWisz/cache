apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cache-app-v2
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ZytaWisz/cache.git
    targetRevision: HEAD
    path: k8s-v2
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: cache-app-v2

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PrunePropagationPolicy=foreground