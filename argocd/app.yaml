apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cache-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ZytaWisz/cache.git
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: cache-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true