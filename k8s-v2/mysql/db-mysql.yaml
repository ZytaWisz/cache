apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: customer-mysql
  namespace: cache-app-v2
  labels:
    app: customer-mysql
  annotations:
    argocd.argoproj.io/sync-wave: "2"

spec:
  serviceName: customer-mysql
  # Added serviceName because StatefulSet requires a stable network identity
  # for predictable pod DNS names and stable storage mapping.

  replicas: 1

  selector:
    matchLabels:
      app: customer-mysql

  template:
    metadata:
      labels:
        app: customer-mysql

    spec:
      containers:
        - name: mysql
          image: mysql:8.0

          ports:
            - containerPort: 3306

          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: customer-service-secret
                  key: DB_ROOT_PASSWORD

            - name: MYSQL_DATABASE
              value: customer_db

            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: customer-service-secret
                  key: DB_USERNAME

            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: customer-service-secret
                  key: DB_PASSWORD

          args:
            - "--server-id=1"
            - "--log-bin=mysql-bin"
            - "--binlog-format=ROW"
            - "--binlog-row-image=FULL"

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql

          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"

            limits:
              memory: "768Mi"
              cpu: "500m"

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysql -h 127.0.0.1 -u root -p$MYSQL_ROOT_PASSWORD -e "SELECT 1"

            initialDelaySeconds: 20
            # Increased delay because MySQL startup can take longer with persistent storage.

            periodSeconds: 5

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -u root -p"$MYSQL_ROOT_PASSWORD"

            initialDelaySeconds: 60
            periodSeconds: 10

  volumeClaimTemplates:
    # Replaced standalone PVC with volumeClaimTemplates.
    # This is the recommended StatefulSet approach because each pod
    # gets its own dedicated persistent storage automatically.

    - metadata:
        name: mysql-storage

      spec:
        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: 256Mi

---

apiVersion: v1
kind: Service

metadata:
  name: customer-mysql
  namespace: cache-app-v2

spec:
  clusterIP: None
  # Changed to headless service.
  # StatefulSets should use a headless service for stable DNS identities.

  selector:
    app: customer-mysql

  ports:
    - port: 3306
      targetPort: 3306