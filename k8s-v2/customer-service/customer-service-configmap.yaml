apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-service-config
  namespace: cache-app-v2
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  SPRING_PROFILES_ACTIVE: "k8s"
  DB_URL: "jdbc:mysql://customer-mysql:3306/customer_db"
  SPRING_REDIS_HOST: "customer-redis"
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-kafka-bootstrap.strimzi-system.svc.cluster.local:9092"